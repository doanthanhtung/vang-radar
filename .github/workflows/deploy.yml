name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    name: Deploy production
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, Windows, vang-radar-prod]
    defaults:
      run:
        shell: powershell

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Skip stale deploys
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          "DEPLOY_IS_LATEST=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if ($env:EVENT_NAME -ne "workflow_run") {
            Write-Host "Manual deploy requested for $env:DEPLOY_SHA; stale deploy guard is bypassed."
            return
          }

          git fetch --quiet origin main
          if ($LASTEXITCODE -ne 0) { throw "Failed to fetch latest main." }

          $latestMain = (git rev-parse origin/main).Trim()
          if ($env:DEPLOY_SHA -ne $latestMain) {
            "DEPLOY_IS_LATEST=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "::notice::Skipping stale deploy. Candidate $env:DEPLOY_SHA is not latest main $latestMain."
            return
          }

          Write-Host "Deploy candidate $env:DEPLOY_SHA is latest main."

      - name: Write production environment
        if: ${{ env.DEPLOY_IS_LATEST == 'true' }}
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PRODUCTION_ENV)) {
            throw "Missing GitHub secret PRODUCTION_ENV. Store the full production .env content in this secret."
          }

          $encoding = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText((Join-Path $PWD ".env"), $env:PRODUCTION_ENV, $encoding)

      - name: Check Docker
        if: ${{ env.DEPLOY_IS_LATEST == 'true' }}
        run: |
          docker version
          docker compose version

      - name: Login to GitHub Container Registry
        if: ${{ env.DEPLOY_IS_LATEST == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Pull, migrate, seed, and start services
        if: ${{ env.DEPLOY_IS_LATEST == 'true' }}
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          $composeFile = "infra/docker-compose.home-server.yml"
          $env:APP_IMAGE = "ghcr.io/${{ github.repository }}/app:$env:IMAGE_TAG"
          Write-Host "Deploying image $env:APP_IMAGE"

          docker compose --profile tunnel -f $composeFile up -d postgres redis
          if ($LASTEXITCODE -ne 0) { throw "Failed to start data services." }

          docker compose --profile tunnel -f $composeFile pull app-setup api worker web
          if ($LASTEXITCODE -ne 0) { throw "Failed to pull production image." }

          docker compose -f $composeFile run --rm -T app-setup
          if ($LASTEXITCODE -ne 0) {
            $setupExitCode = $LASTEXITCODE
            docker compose -f $composeFile logs --tail 120 app-setup
            throw "App setup failed with exit code $setupExitCode."
          }

          docker compose --profile tunnel -f $composeFile up -d --no-deps --force-recreate --remove-orphans api worker web cloudflared
          if ($LASTEXITCODE -ne 0) { throw "Failed to start production services." }

      - name: Health check
        if: ${{ env.DEPLOY_IS_LATEST == 'true' }}
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          $env:APP_IMAGE = "ghcr.io/${{ github.repository }}/app:$env:IMAGE_TAG"

          function Wait-HttpOk {
            param(
              [Parameter(Mandatory = $true)][string]$Url,
              [int]$Attempts = 60
            )

            for ($attempt = 1; $attempt -le $Attempts; $attempt++) {
              $statusCode = & curl.exe --silent --output NUL --write-out "%{http_code}" --max-time 5 $Url
              if ($LASTEXITCODE -eq 0 -and $statusCode -match "^2\d\d$") {
                Write-Host "$Url is ready (HTTP $statusCode)."
                return
              }

              Start-Sleep -Seconds 2
            }

            throw "$Url did not become ready."
          }

          Wait-HttpOk -Url "http://127.0.0.1:3000"
          Wait-HttpOk -Url "http://127.0.0.1:4000/api/v1/health"

      - name: Clean old application images
        if: ${{ env.DEPLOY_IS_LATEST == 'true' }}
        env:
          APP_IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}/app
          KEEP_IMAGE_COUNT: "3"
        run: |
          try {
            Write-Host "Docker disk usage before application image cleanup:"
            docker system df

            $taggedImageLines = @(
              docker image ls $env:APP_IMAGE_REPOSITORY --no-trunc --format "{{.ID}}|{{.Tag}}"
            )
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to list application images."
            }

            $shaImageIds = @(
              $taggedImageLines |
                ForEach-Object {
                  $parts = $_ -split "\|", 2
                  if ($parts.Count -eq 2 -and $parts[1] -match "^[0-9a-f]{40}$") {
                    $parts[0]
                  }
                } |
                Sort-Object -Unique
            )

            $imageRecords = @(
              foreach ($imageId in $shaImageIds) {
                $created = docker image inspect $imageId --format "{{.Created}}"
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "::warning::Could not inspect application image $imageId; keeping it."
                  $global:LASTEXITCODE = 0
                  continue
                }

                [PSCustomObject]@{
                  Id = $imageId
                  Created = [DateTimeOffset]::Parse($created.Trim())
                }
              }
            )

            $runningImageIds = @(
              docker ps --format "{{.ID}}" |
                ForEach-Object {
                  $runningImageId = docker inspect $_ --format "{{.Image}}"
                  if ($LASTEXITCODE -eq 0) {
                    $runningImageId.Trim()
                  } else {
                    Write-Host "::warning::Could not inspect running container $_; skipping it."
                    $global:LASTEXITCODE = 0
                  }
                } |
                Sort-Object -Unique
            )

            $keepImageIds = @(
              $imageRecords |
                Sort-Object Created -Descending |
                Select-Object -First ([int]$env:KEEP_IMAGE_COUNT) |
                ForEach-Object { $_.Id }
              $runningImageIds
            ) | Sort-Object -Unique

            $removableImages = @(
              $imageRecords | Where-Object { $_.Id -notin $keepImageIds }
            )

            Write-Host "Keeping $($keepImageIds.Count) application image(s); removing $($removableImages.Count) old image(s)."
            foreach ($image in $removableImages) {
              docker image rm --force $image.Id
              if ($LASTEXITCODE -ne 0) {
                Write-Host "::warning::Could not remove old application image $($image.Id)."
                $global:LASTEXITCODE = 0
              }
            }

            docker image prune -f
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning::Could not prune dangling Docker images."
              $global:LASTEXITCODE = 0
            }

            Write-Host "Docker disk usage after application image cleanup:"
            docker system df
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::warning::Could not read final Docker disk usage."
            }
          } catch {
            Write-Host "::warning::Application image cleanup failed: $($_.Exception.Message)"
          } finally {
            $global:LASTEXITCODE = 0
          }

      - name: Show service status
        if: ${{ always() && env.DEPLOY_IS_LATEST == 'true' }}
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          $env:APP_IMAGE = "ghcr.io/${{ github.repository }}/app:$env:IMAGE_TAG"
          docker compose --profile tunnel -f infra/docker-compose.home-server.yml ps
