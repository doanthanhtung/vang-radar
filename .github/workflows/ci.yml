name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vangradar
      REDIS_URL: redis://localhost:6379
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vangradar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vangradar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @vang-radar/db exec prisma migrate deploy
      - run: pnpm db:seed
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: node --test infra/scripts/deploy-image-retention.test.mjs
      - run: pnpm build

  build-image:
    name: Build production image
    needs: verify
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/app:${{ github.sha }}
            ghcr.io/${{ github.repository }}/app:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.vangscore.com/api/v1
            PUBLIC_API_BASE_URL=http://api:4000/api/v1
            LOCAL_API_PROXY_TARGET=http://api:4000/api/v1
            PUBLIC_WEB_URL=https://vangscore.com
          cache-from: type=gha
          cache-to: type=gha,mode=max
