services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vangradar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vangradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${APP_IMAGE}
    restart: unless-stopped
    working_dir: /app
    command: pnpm --filter @vang-radar/api start
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vangradar
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:4000:4000"
    depends_on:
      app-setup:
        condition: service_completed_successfully

  worker:
    image: ${APP_IMAGE}
    restart: unless-stopped
    working_dir: /app
    command: pnpm --filter @vang-radar/worker start
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vangradar
      REDIS_URL: redis://redis:6379
    depends_on:
      app-setup:
        condition: service_completed_successfully

  web:
    image: ${APP_IMAGE}
    restart: unless-stopped
    working_dir: /app
    command: pnpm --filter @vang-radar/web start
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PUBLIC_API_BASE_URL: http://api:4000/api/v1
      LOCAL_API_PROXY_TARGET: http://api:4000/api/v1
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      app-setup:
        condition: service_completed_successfully
      api:
        condition: service_started

  app-setup:
    image: ${APP_IMAGE}
    working_dir: /app
    command: >
      sh -c "pnpm db:generate &&
      pnpm --filter @vang-radar/db exec prisma migrate deploy &&
      pnpm db:seed"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      CI: "true"
      HUSKY: "0"
      TURBO_TELEMETRY_DISABLED: "1"
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vangradar
      REDIS_URL: redis://redis:6379
      PUBLIC_API_BASE_URL: http://api:4000/api/v1
      LOCAL_API_PROXY_TARGET: http://api:4000/api/v1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate run
    env_file:
      - ../.env
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - web
      - api

volumes:
  postgres_data:
