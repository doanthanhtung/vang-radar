services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vangradar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vangradar"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @vang-radar/api start"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vangradar
      REDIS_URL: redis://redis:6379
    ports:
      - "127.0.0.1:4000:4000"
    volumes:
      - ..:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - domain_node_modules:/app/packages/domain/node_modules
      - config_node_modules:/app/packages/config/node_modules
      - logger_node_modules:/app/packages/logger/node_modules
    depends_on:
      app-setup:
        condition: service_completed_successfully

  worker:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @vang-radar/worker start"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vangradar
      REDIS_URL: redis://redis:6379
    volumes:
      - ..:/app
      - root_node_modules:/app/node_modules
      - worker_node_modules:/app/apps/worker/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - domain_node_modules:/app/packages/domain/node_modules
      - config_node_modules:/app/packages/config/node_modules
      - logger_node_modules:/app/packages/logger/node_modules
    depends_on:
      app-setup:
        condition: service_completed_successfully

  web:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /app
    command: sh -c "corepack enable && pnpm --filter @vang-radar/web start"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PUBLIC_API_BASE_URL: http://api:4000/api/v1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ..:/app
      - root_node_modules:/app/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - domain_node_modules:/app/packages/domain/node_modules
    depends_on:
      app-setup:
        condition: service_completed_successfully
      api:
        condition: service_started

  app-setup:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable &&
      pnpm install --frozen-lockfile &&
      pnpm db:generate &&
      pnpm --filter @vang-radar/db exec prisma migrate deploy &&
      pnpm db:seed &&
      pnpm build"
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vangradar
      REDIS_URL: redis://redis:6379
    volumes:
      - ..:/app
      - root_node_modules:/app/node_modules
      - api_node_modules:/app/apps/api/node_modules
      - worker_node_modules:/app/apps/worker/node_modules
      - web_node_modules:/app/apps/web/node_modules
      - db_node_modules:/app/packages/db/node_modules
      - domain_node_modules:/app/packages/domain/node_modules
      - config_node_modules:/app/packages/config/node_modules
      - logger_node_modules:/app/packages/logger/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles: ["tunnel"]
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - ../.env
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  root_node_modules:
  api_node_modules:
  worker_node_modules:
  web_node_modules:
  db_node_modules:
  domain_node_modules:
  config_node_modules:
  logger_node_modules:
