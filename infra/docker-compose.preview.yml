services:
  web-preview:
    image: node:22-alpine
    working_dir: /app
    command: >
      sh -c "corepack enable && pnpm --filter @vang-radar/web dev"
    env_file:
      - ../.env
    environment:
      NODE_ENV: development
      PUBLIC_API_BASE_URL: http://host.docker.internal:4000/api/v1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api-preview
      LOCAL_API_PROXY_TARGET: http://host.docker.internal:4000/api/v1
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "127.0.0.1:3001:3000"
    volumes:
      - ..:/app
      - infra_root_node_modules:/app/node_modules:ro
      - infra_web_node_modules:/app/apps/web/node_modules:ro
      - infra_domain_node_modules:/app/packages/domain/node_modules:ro

volumes:
  infra_root_node_modules:
    external: true
  infra_web_node_modules:
    external: true
  infra_domain_node_modules:
    external: true
